<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#064e3b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- QR Code Icon Shape -->
  <g transform="translate(80, 165)">
    <!-- Outer corners -->
    <rect x="0" y="0" width="100" height="100" fill="none" stroke="#fff" stroke-width="10"/>
    <rect x="25" y="25" width="50" height="50" fill="#fff"/>
    <rect x="200" y="0" width="100" height="100" fill="none" stroke="#fff" stroke-width="10"/>
    <rect x="225" y="25" width="50" height="50" fill="#fff"/>
    <rect x="0" y="200" width="100" height="100" fill="none" stroke="#fff" stroke-width="10"/>
    <rect x="25" y="225" width="50" height="50" fill="#fff"/>
    <!-- Random QR modules -->
    <rect x="130" y="0" width="20" height="20" fill="#fff"/>
    <rect x="170" y="20" width="20" height="20" fill="#fff"/>
    <rect x="130" y="40" width="20" height="20" fill="#fff"/>
    <rect x="130" y="80" width="20" height="20" fill="#fff"/>
    <rect x="170" y="120" width="20" height="20" fill="#fff"/>
    <rect x="210" y="140" width="20" height="20" fill="#fff"/>
    <rect x="130" y="160" width="20" height="20" fill="#fff"/>
    <rect x="130" y="200" width="20" height="20" fill="#fff"/>
    <rect x="170" y="220" width="20" height="20" fill="#fff"/>
    <rect x="210" y="240" width="20" height="20" fill="#fff"/>
    <rect x="250" y="200" width="20" height="20" fill="#fff"/>
    <rect x="250" y="240" width="20" height="20" fill="#fff"/>
  </g>
  <!-- Text -->
  <text x="500" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#fff">QR Tools</text>
  <text x="500" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#a7f3d0">Free QR Code Generator</text>
  <text x="500" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#6ee7b7">No signup &#8226; No watermark &#8226; 100% private</text>
</svg>
