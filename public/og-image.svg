<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- QR Icon -->
  <rect x="80" y="180" width="120" height="120" rx="20" fill="#059669"/>
  <g transform="translate(110, 210)">
    <rect width="20" height="20" rx="2" fill="white"/>
    <rect x="30" width="20" height="20" rx="2" fill="white"/>
    <rect y="30" width="20" height="20" rx="2" fill="white"/>
    <rect x="15" y="15" width="20" height="20" rx="2" fill="white" opacity="0.5"/>
    <rect x="40" y="40" width="10" height="10" rx="1" fill="white"/>
  </g>
  
  <!-- Title -->
  <text x="80" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#059669" font-weight="600">QR Tools</text>
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="64" fill="#0f172a" font-weight="800">Free QR Code Generator</text>
  <text x="80" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#64748b">No signup • No watermark • 100% private</text>
  
  <!-- Feature badges -->
  <rect x="80" y="520" width="160" height="40" rx="20" fill="#d1fae5"/>
  <text x="160" y="546" font-family="system-ui, sans-serif" font-size="16" fill="#059669" text-anchor="middle">SVG + PNG</text>
  
  <rect x="260" y="520" width="140" height="40" rx="20" fill="#d1fae5"/>
  <text x="330" y="546" font-family="system-ui, sans-serif" font-size="16" fill="#059669" text-anchor="middle">Logo Support</text>
  
  <rect x="420" y="520" width="180" height="40" rx="20" fill="#d1fae5"/>
  <text x="510" y="546" font-family="system-ui, sans-serif" font-size="16" fill="#059669" text-anchor="middle">6 QR Code Types</text>
</svg>
